# ============================================================
# Alembic Configuration - AutonoCX
# ============================================================
# The actual database URL is loaded from the environment inside
# env.py, so the value below is only a fallback for local dev.

[alembic]
script_location = %(here)s
prepend_sys_path = .
sqlalchemy.url = postgresql+asyncpg://autonomocx:autonomocx_dev@localhost:5432/autonomocx

# Version file format: use a shorter hash prefix for readability
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
truncate_slug_length = 60

# Timezone for revision timestamps
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
